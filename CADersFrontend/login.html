<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>CADers – Admin Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Admin login page for the CADers Club Portfolio management system." />
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* ─── Login Page Styles ─────────────────────────────── */
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      position: relative;
      overflow: hidden;
    }

    .login-page::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 30% 40%, rgba(0, 200, 83, 0.04) 0%, transparent 50%),
                  radial-gradient(circle at 70% 60%, rgba(0, 200, 83, 0.03) 0%, transparent 50%);
      animation: loginGlow 15s ease-in-out infinite alternate;
    }

    @keyframes loginGlow {
      0% { transform: translate(0, 0); }
      100% { transform: translate(-3%, -3%); }
    }

    .login-card {
      background: #16161e;
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 16px;
      padding: 3rem;
      width: 100%;
      max-width: 420px;
      position: relative;
      z-index: 2;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
    }

    .login-header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .login-header .login-logo {
      width: 56px;
      height: 56px;
      margin: 0 auto 1rem;
      display: block;
    }

    .login-header h1 {
      font-family: 'Outfit', Arial, sans-serif;
      font-size: 1.8rem;
      font-weight: 700;
      color: #e8e8f0;
      margin-bottom: 0.4rem;
    }

    .login-header p {
      font-size: 0.88rem;
      color: #9a9ab0;
    }

    .last-visit-banner {
      background: rgba(0, 200, 83, 0.08);
      border: 1px solid rgba(0, 200, 83, 0.2);
      border-radius: 8px;
      padding: 0.8rem 1rem;
      margin-bottom: 1.5rem;
      text-align: center;
      display: none;
    }

    .last-visit-banner .welcome-text {
      font-family: 'Outfit', Arial, sans-serif;
      font-weight: 600;
      color: #00c853;
      font-size: 0.9rem;
    }

    .last-visit-banner .visit-time {
      font-size: 0.78rem;
      color: #9a9ab0;
      margin-top: 0.2rem;
    }

    .login-form .form-group {
      margin-bottom: 1.2rem;
    }

    .remember-group {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 1.5rem;
    }

    .remember-group input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: #00c853;
      cursor: pointer;
    }

    .remember-group label {
      font-size: 0.85rem;
      color: #9a9ab0;
      cursor: pointer;
      text-transform: none;
      letter-spacing: 0;
    }

    .login-error {
      color: #ff5252;
      font-size: 0.85rem;
      text-align: center;
      margin-top: 1rem;
      min-height: 1.2em;
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.85rem;
      color: #9a9ab0;
    }

    .back-link:hover {
      color: #00c853;
    }
  </style>
</head>
<body>

  <div class="login-page">
    <div class="login-card">
      <div class="login-header">
        <img src="Cader.png" alt="CADers Logo" class="login-logo" />
        <h1>Admin <span class="accent">Login</span></h1>
        <p>Sign in to manage the CADers portfolio</p>
      </div>

      <!-- Last Visit Banner -->
      <div class="last-visit-banner" id="last-visit-banner">
        <div class="welcome-text">Welcome Back!</div>
        <div class="visit-time" id="last-visit-time"></div>
      </div>

      <form id="login-form" class="login-form contact-form" style="background:none;border:none;padding:0;">
        <div class="form-group">
          <label for="login-username">Username</label>
          <input type="text" id="login-username" name="username" required
                 placeholder="Enter your username" autocomplete="username" />
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" name="password" required
                 placeholder="Enter your password" autocomplete="current-password" />
        </div>
        <div class="remember-group">
          <input type="checkbox" id="remember-me" name="rememberMe" />
          <label for="remember-me">Remember Me</label>
        </div>
        <button type="submit" id="login-submit" class="btn-submit">
          <span id="login-btn-text">Sign In</span>
          <span id="login-btn-loading" style="display:none;">Signing in...</span>
        </button>
        <p id="login-error" class="login-error"></p>
      </form>

      <a href="caders.html" class="back-link">← Back to Portfolio</a>
    </div>
  </div>

  <script src="login.js"></script>
</body>
</html>
